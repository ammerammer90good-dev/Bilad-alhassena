<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير الآليات</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Cairo','Segoe UI',Tahoma,sans-serif;direction:rtl;
         background:#0f1923;min-height:100vh;display:flex;
         align-items:center;justify-content:center;padding:24px;}
    .box{background:linear-gradient(135deg,#1e293b,#0f172a);
         border:1px solid rgba(245,158,11,0.3);border-radius:20px;
         padding:32px 24px;text-align:center;max-width:360px;width:100%;
         box-shadow:0 20px 60px rgba(0,0,0,0.5);}
    .icon{font-size:60px;margin-bottom:16px;}
    h2{font-size:20px;font-weight:900;color:#f1f5f9;margin-bottom:8px;}
    p{font-size:13px;color:#94a3b8;margin-bottom:28px;line-height:1.9;}
    .btn{width:100%;background:linear-gradient(90deg,#f59e0b,#d97706);
         border:none;border-radius:14px;padding:16px;color:#0f1923;
         font-weight:900;font-size:16px;cursor:pointer;
         font-family:inherit;margin-bottom:12px;
         box-shadow:0 4px 15px rgba(245,158,11,0.3);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-back{width:100%;background:transparent;
              border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;
              padding:14px;color:#94a3b8;font-weight:700;font-size:14px;
              cursor:pointer;font-family:inherit;}
    .progress{display:none;margin:16px 0;}
    .progress-bar{height:6px;background:rgba(255,255,255,0.1);
                  border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);
                   border-radius:99px;width:0%;transition:width 0.3s;}
    .progress-text{font-size:12px;color:#94a3b8;margin-top:8px;}
    #errMsg{color:#ef4444;font-size:13px;margin-top:12px;display:none;
            background:rgba(239,68,68,0.1);border-radius:10px;padding:10px;}

    /* محتوى PDF — مخفي في الشاشة */
    #pdfContent{
      position:absolute;left:-9999px;top:0;
      width:794px;background:white;color:#1a1a1a;
      font-family:'Cairo','Segoe UI',Tahoma,sans-serif;direction:rtl;
    }
    #pdfContent .driver-page{padding:20px;max-width:754px;margin:0 auto;}
    #pdfContent .drv-hdr{border-bottom:3px solid #f59e0b;padding-bottom:10px;margin-bottom:14px;}
    #pdfContent .drv-title{font-size:18px;font-weight:900;color:#1e3a5f;}
    #pdfContent .drv-sub{font-size:10px;color:#555;margin-top:3px;}
    #pdfContent table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px;}
    #pdfContent th{background:#1e3a5f;color:white;padding:7px 8px;text-align:right;font-weight:700;}
    #pdfContent td{padding:6px 8px;border-bottom:1px solid #e5e7eb;}
    #pdfContent tr:nth-child(even) td{background:#f9fafb;}
    #pdfContent .tot td{font-weight:900;background:#fef3c7;color:#92400e;}
    #pdfContent .section-title{font-size:12px;font-weight:800;color:#1e3a5f;
      border-right:4px solid #f59e0b;padding-right:8px;margin:10px 0 7px;}
  </style>
</head>
<body>

<div class="box">
  <div class="icon">📄</div>
  <h2>تقرير الآليات</h2>
  <p>اضغط لتحويل التقرير إلى PDF<br/>ثم يمكنك فتحه وطباعته أو مشاركته</p>

  <button class="btn" id="pdfBtn" onclick="generatePDF()">📥 تحويل إلى PDF</button>
  <button class="btn-back" onclick="goBack()">← رجوع</button>

  <div class="progress" id="progressBox">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">جاري التحويل...</div>
  </div>

  <div id="errMsg"></div>
</div>

<!-- محتوى التقرير المخفي -->
<div id="pdfContent"></div>

<script>
  const html = localStorage.getItem("__printJob");

  if(!html){
    document.getElementById("errMsg").style.display="block";
    document.getElementById("errMsg").innerHTML="⚠️ لا توجد بيانات<br/>ارجع وأعد الضغط على طباعة";
    document.getElementById("pdfBtn").disabled=true;
  } else {
    // استخرج المحتوى وضعه
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    document.getElementById("pdfContent").innerHTML = doc.body.innerHTML;
  }

  function setProgress(pct, text){
    document.getElementById("progressFill").style.width = pct+"%";
    document.getElementById("progressText").textContent = text;
  }

  function generatePDF(){
    if(!html) return;
    const btn = document.getElementById("pdfBtn");
    const prog = document.getElementById("progressBox");

    btn.disabled = true;
    btn.textContent = "⏳ جاري التحويل...";
    prog.style.display = "block";

    setProgress(20, "جاري تجهيز المحتوى...");

    const content = document.getElementById("pdfContent");
    content.style.left = "0";
    content.style.position = "relative";

    setTimeout(()=>{
      setProgress(50, "جاري إنشاء PDF...");

      const opt = {
        margin: [10, 10, 10, 10],
        filename: "تقرير_الآليات_" + new Date().toLocaleDateString("ar-IQ").replace(/\//g,"-") + ".pdf",
        image: { type:"jpeg", quality:0.95 },
        html2canvas: {
          scale: 1.5,
          useCORS: true,
          allowTaint: true,
          scrollY: 0,
          windowWidth: 794
        },
        jsPDF: { unit:"mm", format:"a4", orientation:"portrait" },
        pagebreak: { mode:["avoid-all","css","legacy"] }
      };

      html2pdf().set(opt).from(content).toPdf().get("pdf").then(function(pdf){
        setProgress(90, "جاري فتح الملف...");
        const blob = pdf.output("blob");
        const url = URL.createObjectURL(blob);
        localStorage.removeItem("__printJob");

        setProgress(100, "تم! جاري الفتح...");

        setTimeout(()=>{
          // فتح PDF في نافذة جديدة
          window.open(url, "_blank");

          // إعادة الزر
          btn.disabled = false;
          btn.textContent = "📥 تحويل إلى PDF مرة أخرى";
          prog.style.display = "none";
        }, 500);

      }).catch(function(err){
        btn.disabled = false;
        btn.textContent = "📥 تحويل إلى PDF";
        prog.style.display = "none";
        document.getElementById("errMsg").style.display = "block";
        document.getElementById("errMsg").textContent = "❌ خطأ: " + err.message;
      });

    }, 300);
  }

  function goBack(){
    window.location.href = "index.html";
  }
</script>
</body>
</html>
