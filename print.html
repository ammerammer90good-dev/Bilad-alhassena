<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>طباعة التقرير</title>
  <style>
    body{font-family:'Cairo','Segoe UI',Tahoma,sans-serif;direction:rtl;background:#f9fafb;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
    .box{text-align:center;padding:32px;background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);max-width:340px;width:90%;}
    .icon{font-size:48px;margin-bottom:12px;}
    h2{font-size:18px;font-weight:900;color:#1e3a5f;margin-bottom:8px;}
    p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.8;}
    .btn{display:inline-block;background:linear-gradient(90deg,#f59e0b,#d97706);border:none;border-radius:12px;padding:13px 28px;color:#0f1923;font-weight:900;font-size:15px;cursor:pointer;font-family:inherit;width:100%;margin-bottom:10px;}
    .btn-back{background:transparent;border:2px solid #e5e7eb;border-radius:12px;padding:11px 28px;color:#64748b;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;width:100%;}
    #printFrame{display:none;}
    @media print{
      body{background:white;display:block;}
      .box{display:none;}
      #printFrame{display:block;width:100%;border:none;}
    }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🖨️</div>
  <h2>تقرير جاهز للطباعة</h2>
  <p>اضغط طباعة لفتح مربع حوار الطباعة<br/>يمكنك اختيار طابعة أو حفظ PDF</p>
  <button class="btn" onclick="doPrint()">🖨️ طباعة الآن</button>
  <button class="btn-back" onclick="goBack()">← رجوع</button>
  <div id="errMsg" style="display:none;color:#ef4444;font-size:12px;margin-top:12px;"></div>
</div>

<iframe id="printFrame"></iframe>

<script>
  const html = localStorage.getItem("__printJob");

  if(!html){
    document.getElementById("errMsg").style.display="block";
    document.getElementById("errMsg").textContent="⚠️ لا توجد بيانات للطباعة. يرجى الرجوع وإعادة المحاولة.";
    document.querySelector(".btn").disabled=true;
    document.querySelector(".btn").style.opacity="0.5";
  }

  function doPrint(){
    if(!html) return;
    const frame = document.getElementById("printFrame");
    // كتابة المحتوى في الـ iframe
    frame.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;border:none;background:white;z-index:9999;display:block;";
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
    // انتظار تحميل المحتوى ثم طباعة
    frame.onload = function(){
      setTimeout(()=>{
        frame.contentWindow.focus();
        frame.contentWindow.print();
        // إخفاء الـ iframe بعد الطباعة
        frame.contentWindow.onafterprint = function(){
          frame.style.display="none";
        };
        setTimeout(()=>{ frame.style.display="none"; }, 3000);
      }, 400);
    };
    // حذف البيانات من localStorage بعد الاستخدام
    localStorage.removeItem("__printJob");
  }

  function goBack(){
    localStorage.removeItem("__printJob");
    if(window.history.length > 1){ window.history.back(); }
    else { window.close(); }
  }

  // طباعة تلقائية بعد ثانية واحدة
  if(html){
    setTimeout(doPrint, 800);
  }
</script>
</body>
</html>
